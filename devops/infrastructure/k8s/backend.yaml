# ============================================================
# HumanEye — Kubernetes Backend Deployment (Phase 2 — EKS)
# Apply: kubectl apply -f k8s/backend.yaml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: humaneye-backend
  namespace: humaneye
  labels:
    app: backend
    project: humaneye
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: humaneye-backend
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/humaneye/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: humaneye-backend-secrets
          env:
            - name: ENV
              value: "production"
            - name: ML_ENGINE_URL
              value: "http://humaneye-ml-engine:8001"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: humaneye-backend
  namespace: humaneye
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: humaneye-backend-hpa
  namespace: humaneye
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: humaneye-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
