# HumanEye Redis Configuration

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshot)
save 900 1
save 300 10
save 60 10000

# Security — set password in production via environment
# requirepass YOUR_REDIS_PASSWORD

# Performance
hz 10
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
