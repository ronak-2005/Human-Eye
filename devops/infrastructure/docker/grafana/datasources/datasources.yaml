apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: humaneye
    user: humaneye
    secureJsonData:
      password: humaneye_dev
    jsonData:
      sslmode: disable
      maxOpenConns: 5
    editable: false
