global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "humaneye-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "humaneye-ml-engine"
    static_configs:
      - targets: ["ml_engine:8001"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
