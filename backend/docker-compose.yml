version: "3.9"

# HumanEye — Local Development Environment
# Start backend stack:   docker-compose up backend postgres timescaledb redis celery celery_beat --build
# Start everything:      docker-compose up --build
# Run migrations:        make migrate

services:

  # ── FastAPI Backend (port 8000) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── ML Engine (placeholder — ML engineer replaces this) ───────────────────
  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - timescaledb
      - redis
    restart: unless-stopped

  # ── Dashboard (placeholder — frontend engineer replaces this) ─────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL 15 (primary data) ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: humaneye
      POSTGRES_PASSWORD: humaneye_dev
      POSTGRES_DB: humaneye
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humaneye"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── TimescaleDB (behavioral signal streams) ───────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: humaneye
      POSTGRES_PASSWORD: humaneye_dev
      POSTGRES_DB: humaneye_signals
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infrastructure/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humaneye"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis (cache + rate limiting + celery broker) ─────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Celery Worker (webhook + async verification tasks) ────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - timescaledb
      - redis
    restart: unless-stopped

  # ── Celery Beat (scheduled tasks) ────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A core.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped

  # ── MLflow (model tracking — ML engineer uses this) ───────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://humaneye:humaneye_dev@postgres:5432/humaneye
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── HashiCorp Vault (secrets management) ─────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    restart: unless-stopped

  # ── Grafana (monitoring dashboards) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  mlflow_data:
  grafana_data:
